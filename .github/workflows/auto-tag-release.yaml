name: Auto Tag Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Read package version
        id: version
        run: echo "value=$(jq -r '.version' deno.json)" >> "$GITHUB_OUTPUT"

      - name: Check release state
        id: checks
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

          if npm view "@alavida/linear-cli@${VERSION}" version >/dev/null 2>&1; then
            echo "npm_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release trigger token
        if: steps.checks.outputs.tag_exists != 'true' && steps.checks.outputs.npm_exists != 'true'
        env:
          RELEASE_TRIGGER_TOKEN: ${{ secrets.RELEASE_TRIGGER_TOKEN }}
        run: |
          if [ -z "$RELEASE_TRIGGER_TOKEN" ]; then
            echo "RELEASE_TRIGGER_TOKEN secret is required to push release tags."
            exit 1
          fi

      - name: Create and push tag
        if: steps.checks.outputs.tag_exists != 'true' && steps.checks.outputs.npm_exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TRIGGER_TOKEN }}
          RELEASE_TRIGGER_TOKEN: ${{ secrets.RELEASE_TRIGGER_TOKEN }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${RELEASE_TRIGGER_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          gh workflow run release.yml --repo "${GITHUB_REPOSITORY}" --ref "v${VERSION}"
